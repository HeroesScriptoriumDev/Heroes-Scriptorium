<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Public Profile
    </title>

    <link
        rel="stylesheet"
        href="../02_CSS/public_profile_en.css"
    >

</head>

<body>

    <main class="profile-page">

        <section class="profile-card">

            <div class="profile-header">

                <img
                    id="profile-avatar"
                    src="../04_IMAGES/default_avatar.png"
                    alt="Profile Avatar"
                >

                <div>

                    <h1 id="profile-name">
                        Loading...
                    </h1>

                    <h2 id="profile-title">
                        Loading...
                    </h2>

                </div>

            </div>

            <div class="profile-body">

                <div class="profile-row">

                    <strong>
                        Username
                    </strong>

                    <span id="profile-username">
                        Loading...
                    </span>

                </div>

                <div class="profile-row">

                    <strong>
                        Pronouns
                    </strong>

                    <span id="profile-pronouns">
                        Loading...
                    </span>

                </div>

                <div class="profile-row">

                    <strong>
                        Status
                    </strong>

                    <span id="profile-status">
                        Loading...
                    </span>

                </div>

                <div class="profile-bio">

                    <h3>
                        Biography
                    </h3>

                    <p id="profile-bio">
                        Loading...
                    </p>

                </div>

            </div>

        </section>

    </main>

    <script
        src="../03_JS/public_profile_en.js"
    ></script>

</body>

</html>
