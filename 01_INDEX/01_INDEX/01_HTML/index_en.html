<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Heroes Scriptorium
  </title>

  <!-- MAIN CSS -->
  <link
    rel="stylesheet"
    href="../02_CSS/index_en.css"
  >

</head>

<body>

  <!-- ===================================================== -->
  <!-- MAIN APPLICATION WRAPPER -->
  <!-- ===================================================== -->

  <div class="launcher-page">

    <!-- BACKGROUND -->
    <div class="launcher-background"></div>

    <!-- OVERLAY -->
    <div class="launcher-overlay"></div>

    <!-- ================================================= -->
    <!-- MAIN CONTENT -->
    <!-- ================================================= -->

    <main class="launcher-main">

      <!-- ============================================= -->
      <!-- LEFT SIDE -->
      <!-- ============================================= -->

      <section class="launcher-left">

        <!-- BRANDING -->

        <div class="brand-block">

          <h1 class="brand-title">

            <span class="brand-title-line">
              HEROES
            </span>

            <span class="brand-title-line">
              SCRIPTORIUM
            </span>

          </h1>

          <p class="brand-tagline">

            Write Tales. Build Worlds.
            Create Legends.

          </p>

        </div>

        <!-- NEWS PANEL -->

        <section class="news-panel">

          <div class="panel-header">

            <h2>
              What's New
            </h2>

          </div>

          <div id="news-content" class="news-content" >

          </div>

        </section>

        <!-- QUICK LINKS -->

        <nav class="quick-links">

          <button
            id="website-button"
            class="quick-link-btn"
          >
            🌐 Website
          </button>

          <button
            id="docs-button"
            class="quick-link-btn"
          >
            📖 Docs
          </button>

          <button
            id="forums-button"
            class="quick-link-btn"
          >
            💬 Forums
          </button>

          <button
            id="discord-button"
            class="quick-link-btn"
          >
            🎧 Discord
          </button>

        </nav>

      </section>

      <!-- ============================================= -->
      <!-- RIGHT SIDE -->
      <!-- ============================================= -->

      <section class="launcher-right">

        <article class="auth-card">

          <!-- HEADER -->

          <header class="auth-card-header">

            <h2 class="auth-title">

              Welcome Back, Adventurer

            </h2>

            <p class="auth-subtitle">

              Sign in, register,
              or continue offline.

            </p>

          </header>

          <!-- TABS -->

          <div class="auth-tabs">

            <button
              id="login-tab-button"
              class="auth-tab active-tab"
            >

              Login

            </button>

            <button
              id="register-tab-button"
              class="auth-tab"
            >

              Register

            </button>

          </div>

          <!-- ========================================= -->
          <!-- LOGIN FORM -->
          <!-- ========================================= -->

          <div id="login-form">

            <form
              id="launcher-form"
              class="auth-form"
            >

              <!-- EMAIL -->

              <div class="form-group">

                <label class="form-label">

                  Email or Username

                </label>

                <div class="input-frame">

                  <span class="input-icon">
                    👤
                  </span>

                  <input
                    id="username-input"
                    class="auth-input"
                    type="text"
                    placeholder="Enter your email or username"
                  >

                </div>

              </div>

              <!-- PASSWORD -->

              <div class="form-group">

                <label class="form-label">

                  Password

                </label>

                <div class="input-frame">

                  <span class="input-icon">
                    🔒
                  </span>

                  <input
                    id="password-input"
                    class="auth-input"
                    type="password"
                    placeholder="Enter your password"
                  >

                  <button
                    type="button"
                    id="password-toggle-button"
                    class="password-toggle"
                  >

                    👁

                  </button>

                </div>

              </div>

              <!-- OPTIONS -->

              <div class="auth-options">

                <label>

                  <input type="checkbox">

                  Remember Me

                </label>

                <button
                  type="button"
                  class="text-link-btn"
                >

                  Forgot Password?

                </button>

              </div>

              <!-- LOGIN BUTTON -->

              <button
                type="submit"
                id="launcher-login-button"
                class="auth-submit-btn"
              >

                Login to Scriptorium

              </button>

            </form>

          </div>

          <!-- ========================================= -->
          <!-- REGISTER FORM -->
          <!-- ========================================= -->

          <div
            id="register-form"
            class="hidden-form"
          >

            <div class="auth-form">

              <!-- USERNAME -->

              <div class="form-group">

                <label class="form-label">

                  Username

                </label>

                <div class="input-frame">

                  <span class="input-icon">
                    👤
                  </span>

                  <input
                    id="register-username"
                    class="auth-input"
                    type="text"
                    placeholder="Choose a username"
                  >

                </div>

              </div>

              <!-- EMAIL -->

              <div class="form-group">

                <label class="form-label">

                  Email

                </label>

                <div class="input-frame">

                  <span class="input-icon">
                    ✉
                  </span>

                  <input
                    id="register-email"
                    class="auth-input"
                    type="email"
                    placeholder="Enter your email"
                  >

                </div>

              </div>

              <!-- PASSWORD -->

              <div class="form-group">

                <label class="form-label">

                  Password

                </label>

                <div class="input-frame">

                  <span class="input-icon">
                    🔒
                  </span>

                  <input
                    id="register-password"
                    class="auth-input"
                    type="password"
                    placeholder="Create a password"
                  >

                </div>

              </div>

              <!-- CONFIRM PASSWORD -->

              <div class="form-group">

                <label class="form-label">

                  Confirm Password

                </label>

                <div class="input-frame">

                  <span class="input-icon">
                    🔒
                  </span>

                  <input
                    id="register-confirm-password"
                    class="auth-input"
                    type="password"
                    placeholder="Confirm your password"
                  >

                </div>

              </div>

              <!-- REGISTER BUTTON -->

              <button
                id="register-submit-button"
                class="auth-submit-btn"
              >

                Create Account

              </button>

            </div>

          </div>

          <!-- DIVIDER -->

          <div class="auth-divider">

            <span></span>

            <strong>OR</strong>

            <span></span>

          </div>

          <!-- OFFLINE -->

          <button
            id="offline-button"
            class="offline-btn"
          >

            📖 Continue Offline

          </button>

          <p class="offline-help-text">

            Access local campaigns,
            characters,
            and saved content.

          </p>

        </article>

      </section>

    </main>

    <!-- FOOTER -->

    <footer class="launcher-footer">

      <section class="server-status-panel">

        <span class="server-dot"></span>

        <strong>
          Server Status:
        </strong>

        <span id="server-status-text">
          Checking...
        </span>

      </section>

      <div class="version-label">

        v0.1.3 Alpha

      </div>

    </footer>

  </div>

  <!-- MAIN JS -->
  <script src="../03_JS/index_en.js"></script>

</body>

</html>
